<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Crosshair rings (code targeting / eagle eye) -->
  <circle cx="256" cy="220" r="120" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.1"/>
  <circle cx="256" cy="220" r="80" stroke="#58a6ff" stroke-width="1" fill="none" opacity="0.15"/>
  <circle cx="256" cy="220" r="40" stroke="#58a6ff" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Crosshair lines -->
  <g stroke="#58a6ff" stroke-width="1" opacity="0.12">
    <line x1="256" y1="80" x2="256" y2="360"/>
    <line x1="116" y1="220" x2="396" y2="220"/>
  </g>

  <!-- Graph nodes (code entities in a constellation) -->
  <!-- Central node (target) -->
  <circle cx="256" cy="220" r="14" fill="url(#blueGrad)" opacity="0.9" filter="url(#glow)"/>

  <!-- Connected nodes -->
  <circle cx="190" cy="160" r="8" fill="url(#greenGrad)" opacity="0.8"/>
  <circle cx="320" cy="155" r="9" fill="url(#greenGrad)" opacity="0.8"/>
  <circle cx="175" cy="250" r="7" fill="#f97316" opacity="0.7"/>
  <circle cx="340" cy="260" r="8" fill="#f97316" opacity="0.7"/>
  <circle cx="220" cy="300" r="6" fill="url(#blueGrad)" opacity="0.6"/>
  <circle cx="300" cy="290" r="7" fill="url(#blueGrad)" opacity="0.6"/>
  <circle cx="256" cy="140" r="6" fill="url(#greenGrad)" opacity="0.7"/>
  <circle cx="360" cy="200" r="5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="150" cy="200" r="5" fill="#58a6ff" opacity="0.5"/>

  <!-- Edges (relationships between code entities) -->
  <g stroke="#58a6ff" stroke-width="1.5" opacity="0.25" fill="none" stroke-linecap="round">
    <line x1="256" y1="220" x2="190" y2="160"/>
    <line x1="256" y1="220" x2="320" y2="155"/>
    <line x1="256" y1="220" x2="175" y2="250"/>
    <line x1="256" y1="220" x2="340" y2="260"/>
    <line x1="256" y1="220" x2="220" y2="300"/>
    <line x1="256" y1="220" x2="300" y2="290"/>
    <line x1="256" y1="220" x2="256" y2="140"/>
    <line x1="190" y1="160" x2="256" y2="140"/>
    <line x1="320" y1="155" x2="256" y2="140"/>
    <line x1="190" y1="160" x2="175" y2="250"/>
    <line x1="320" y1="155" x2="340" y2="260"/>
    <line x1="220" y1="300" x2="300" y2="290"/>
    <line x1="256" y1="220" x2="360" y2="200"/>
    <line x1="256" y1="220" x2="150" y2="200"/>
  </g>

  <!-- Outer edges (secondary connections) -->
  <g stroke="#3fb950" stroke-width="0.8" opacity="0.15" fill="none">
    <line x1="150" y1="200" x2="175" y2="250"/>
    <line x1="360" y1="200" x2="340" y2="260"/>
    <line x1="150" y1="200" x2="190" y2="160"/>
    <line x1="360" y1="200" x2="320" y2="155"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round">
    <polyline points="88,88 88,108 108,108" fill="none"/>
    <polyline points="424,88 424,108 404,108" fill="none"/>
    <polyline points="88,424 88,404 108,404" fill="none"/>
    <polyline points="424,424 424,404 404,404" fill="none"/>
  </g>

  <!-- DEAGLE text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="44" font-weight="800" fill="#c9d1d9" letter-spacing="8">DEAGLE</text>

  <!-- Subtitle -->
  <text x="256" y="434" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="500" fill="#8b949e" letter-spacing="6">CODE INTELLIGENCE</text>
</svg>
