[book]
title = "Deagle Documentation"
authors = ["DIRMACS"]
description = "Deagle — Rust-native code intelligence. Tree-sitter + SQLite, single binary."
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/dirmacs/deagle"
edit-url-template = "https://github.com/dirmacs/deagle/edit/main/docs/{path}"
site-url = "/deagle/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30

[output.html.fold]
enable = true
level = 1
